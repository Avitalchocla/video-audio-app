name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'build-tools;33.0.0 platforms;android-33 platform-tools'

      - name: ⚙️ Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5 libncursesw5 cmake libffi-dev libssl-dev \
            patch python3-setuptools build-essential wget file libltdl-dev \
            libpq-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: 📥 Download FFmpeg and Font to assets
        run: |
          mkdir -p assets
          echo "Downloading FFmpeg..."
          wget --no-check-certificate \
            'https://docs.google.com/uc?export=download&id=1rKA5Lb0vDMy6CKJClhFT8JIAGUh3icfs' \
            -O assets/ffmpeg
          chmod +x assets/ffmpeg
          ls -la assets/ffmpeg
          file assets/ffmpeg

      - name: 🔍 Check project files
        run: |
          echo "=== Project structure ==="
          ls -la
          echo "=== main.py exists? ==="
          test -f main.py && echo "YES" || echo "NO"
          echo "=== buildozer.spec exists? ==="
          test -f buildozer.spec && echo "YES" || echo "NO"
          echo "=== assets folder ==="
          ls -la assets/

      - name: 🛠️ Accept Android Licenses
        run: |
          export ANDROID_SDK_ROOT=$HOME/.android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;33.0.0" "platforms;android-33" "platform-tools" "ndk;25.2.9519653"

      - name: 🏗️ Build APK with Buildozer
        run: |
          export ANDROID_SDK_ROOT=$HOME/.android/sdk
          export ANDROID_HOME=$HOME/.android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/ndk/25.2.9519653
          
          rm -rf .buildozer bin/
          
          # Debug info
          echo "=== Environment ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          which sdkmanager
          which buildozer
          
          echo "=== Starting build ==="
          buildozer -v android debug 2>&1 | tee build.log || {
            echo "=== BUILD FAILED ==="
            echo "Last 100 lines of log:"
            tail -100 build.log
            exit 1
          }

      - name: 🔍 Find APK
        if: always()
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Bin directory ==="
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          echo "=== Buildozer dists ==="
          ls -la .buildozer/android/platform/build-*/dists/*/bin/ 2>/dev/null || echo "No dists found"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VideoAudioReplacer-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/bin/*.apk
            .buildozer/android/platform/build-*/dists/*/*/*.apk
          if-no-files-found: warn

      - name: 📋 Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            build.log
            .buildozer/android/platform/build-*/build.log
          if-no-files-found: ignore
